<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <link rel="stylesheet" href="style.css" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Controle de Crachás - Início</title>
</head>
<body>

<header>
  <div class="header-content">
    <div>
      <h1>Controle de Crachás</h1>
    </div>
    <nav>
      <a href="index.html">Página Inicial</a>
      <a href="cadastro.html">Cadastros</a>
      <a href="registros.html">Registros</a>
      <a href="login.html" title="Login necessário apenas para cadastrar crachás">Login (cadastro)</a>
      <a id="logoserra" href="index.html">
      <img src="/serra_morena sem fundo cópia.gif" alt="LOGO" link="index.html" class="logo">
      </a>
    </nav>
  </div>
</header>

  <main>
    <section class="registro">
      <h2>Registrar Retirada de Crachá</h2>
      <form id="form-registro">
        <fieldset class="tipo-cracha">
          <legend>Tipo de crachá</legend>
          <div class="tipo-cracha__opcoes">
            <label class="tipo-opcao tipo-opcao--visitante">
              <input type="radio" name="tipo-cracha" value="visitante" required />
              <span class="tipo-opcao__card">
                <span class="tipo-opcao__icone" aria-hidden="true">V</span>
                <span class="tipo-opcao__texto">
                  <strong>Visitante</strong>
                  <small>Acesso externo</small>
                </span>
              </span>
            </label>
            <label class="tipo-opcao tipo-opcao--provisorio">
              <input type="radio" name="tipo-cracha" value="provisorio" />
              <span class="tipo-opcao__card">
                <span class="tipo-opcao__icone" aria-hidden="true">P</span>
                <span class="tipo-opcao__texto">
                  <strong>Provisório</strong>
                  <small>Uso temporário</small>
                </span>
              </span>
            </label>
            <label class="tipo-opcao tipo-opcao--terceiros">
              <input type="radio" name="tipo-cracha" value="terceiros" />
              <span class="tipo-opcao__card">
                <span class="tipo-opcao__icone" aria-hidden="true">T</span>
                <span class="tipo-opcao__texto">
                  <strong>Terceiros</strong>
                  <small>Prestadores</small>
                </span>
              </span>
            </label>
          </div>
        </fieldset>

        <div class="campo-form">
          <label for="chave">Crachá</label>
          <select id="chave" required>
            <option value="">Selecione o crachá</option>
          </select>
        </div>

        <div class="campo-form">
          <label for="nome-retirada">Nome de quem retira</label>
          <input type="text" id="nome-retirada" name="nome-retirada" placeholder="Digite o nome completo" required />
        </div>

        <button type="submit">Registrar retirada</button>
      </form>
    </section>

    <section class="abertas">
      <h2>Crachás Retirados (Em Aberto)</h2>
      <ul id="lista-retiradas">
        <li>Carregando dados...</li>
      </ul>
    </section>
  </main>

  <div id="modal-confirmacao" class="modal-confirmacao" hidden aria-hidden="true">
    <div class="modal-confirmacao__backdrop" data-modal-fechar></div>
    <div class="modal-confirmacao__dialog" role="dialog" aria-modal="true" aria-labelledby="modal-confirmacao-titulo">
      <h3 id="modal-confirmacao-titulo" class="modal-confirmacao__titulo"></h3>
      <p id="modal-confirmacao-mensagem" class="modal-confirmacao__mensagem"></p>
      <dl id="modal-confirmacao-detalhes" class="modal-confirmacao__detalhes"></dl>
      <div class="modal-confirmacao__acoes">
        <button type="button" class="btn-modal-cancelar" data-modal-fechar>Cancelar</button>
        <button type="button" class="btn-modal-confirmar" id="modal-confirmacao-ok">Confirmar</button>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="api.js"></script>
  <script src="script.js?v=6"></script>
</body>
</html>
