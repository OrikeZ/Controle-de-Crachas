  <!-- Cadastro de Crachás -->
  <section>
    <h2>Cadastrar Crachá</h2>
    <form id="form-chave">
      <label for="numero-chave">Número do crachá:</label>
      <input type="text" id="numero-chave" name="numero-chave" required />



      <button type="submit">Adicionar Crachá</button>
    </form>
  </section>

  <section>
    <h2>Excluir Crachá</h2>
    <form id="form-excluir-chave">
      <label for="select-chave-excluir">Crachá cadastrado:</label>
      <select id="select-chave-excluir" required>
        <option value="">Carregando...</option>
      </select>
      <button type="submit" class="btn-excluir">Excluir Crachá</button>
    </form>
  </section>
